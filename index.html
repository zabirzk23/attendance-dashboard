<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="login">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>
<div class="navbar">
    <h2>Attendance Dashboard</h2>
    <button onclick="openSettings()">⚙ Settings</button>
    <button onclick="toggleTheme()">🌙 Toggle Theme</button>
    <button onclick="downloadPDF()">Download Report</button>
</div>

<div class="layout">

    <div class="sidebar">
        <h2>My Attendance</h2>
        <ul>
            <li onclick="showDashboard()">Dashboard</li>
            <li onclick="showSubjects()">Subjects</li>
            <li onclick="showAnalytics()">Analytics</li>
        </ul>
    </div>

    <div class="main">

        <div id="dashboard" class="section">
            <h1>Overall Summary</h1>
            <div id="overallStats"></div>
        </div>

        <div id="subjects" class="section hidden">
            <h1>Subjects</h1>

            <input type="text" id="subjectName" placeholder="Subject Name">
            <input type="number" id="total" placeholder="Total Classes">
            <input type="number" id="attended" placeholder="Classes Attended">
            <button onclick="addSubject()">Add Subject</button>
            <button onclick="clearAll()" style="background:#ef4444;">
    Clear All Data
</button>
            <div id="subjectList"></div>
        </div>

        <div id="analytics" class="section hidden">
            <h1>Attendance Analytics</h1>
            <canvas id="attendanceChart"></canvas>
        </div>

    </div>

</div>

<script src="script.js"></script>
<div id="toast" class="toast"></div>
<div id="settingsModal" class="modal hidden">
  <h2>Settings</h2>

  <label>Attendance Threshold (%)</label>
  <input type="number" id="thresholdInput" value="80">

  <button onclick="saveSettings()">Save</button>
</div>
</body>
</html>
